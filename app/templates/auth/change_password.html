{% extends "base.html" %}
{% block title %}เปลี่ยนรหัสผ่าน — SmartCheck{% endblock %}

{% block content %}
<div class="min-h-[70vh] flex items-center justify-center">
    <div class="w-full max-w-sm">
        <div class="bg-amber-50 border border-amber-200 rounded-xl px-5 py-4 flex items-start gap-3 mb-6">
            <svg class="w-5 h-5 text-amber-600 flex-shrink-0 mt-0.5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
            <div>
                <p class="text-sm font-medium text-amber-800">กรุณาเปลี่ยนรหัสผ่านก่อนเข้าใช้งาน</p>
                <p class="text-xs text-amber-600 mt-0.5">บัญชีนี้ใช้รหัสผ่านชั่วคราวที่ได้รับจากผู้ดูแลระบบ</p>
            </div>
        </div>

        <div class="bg-white rounded-2xl border border-slate-200 shadow-sm p-7">
            <h1 class="text-lg font-semibold text-slate-900 mb-6">ตั้งรหัสผ่านใหม่</h1>
            <form method="POST" action="{{ url_for('auth.change_password') }}">
                <div class="space-y-4">
                    <div>
                        <label class="block text-xs font-medium text-slate-600 mb-1.5">รหัสผ่านใหม่</label>
                        <input type="password" name="new_password" required minlength="8"
                               class="w-full border border-slate-200 rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500/30 focus:border-indigo-400"
                               placeholder="อย่างน้อย 8 ตัวอักษร">
                    </div>
                    <div>
                        <label class="block text-xs font-medium text-slate-600 mb-1.5">ยืนยันรหัสผ่านใหม่</label>
                        <input type="password" name="confirm_password" required minlength="8"
                               class="w-full border border-slate-200 rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500/30 focus:border-indigo-400"
                               placeholder="พิมพ์รหัสผ่านอีกครั้ง">
                    </div>
                </div>
                <button type="submit"
                        class="mt-6 w-full bg-indigo-600 hover:bg-indigo-700 text-white font-medium text-sm py-2.5 rounded-xl transition-colors">
                    บันทึกรหัสผ่าน
                </button>
            </form>
        </div>
    </div>
</div>
{% endblock %}
